name: CD

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  version:
    name: Bump version
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-version-${{ github.ref_name }}
      cancel-in-progress: false
    permissions:
      contents: write
    outputs:
      released: ${{ steps.version.outputs.released }}
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Pin to workflow commit
        run: git reset --hard ${{ github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            environments/*.txt

      - name: Bump version (no tag, no push)
        id: version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pip install python-semantic-release
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if GITHUB_OUTPUT="" semantic-release version --no-tag --no-push; then
            echo "released=true" >> $GITHUB_OUTPUT
            v=$(sed -n 's/^version=//p' VERSION)
            echo "version=$v" >> $GITHUB_OUTPUT
            echo "tag=v$v" >> $GITHUB_OUTPUT
            awk '/^## v'"$v"'/{p=1; print; next} p{if(/^## /) exit; print}' CHANGELOG.md > release_notes.md
          fi

      - name: Upload release notes
        if: steps.version.outputs.released == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release_notes.md

  build:
    name: Build and push ${{ matrix.image }} image
    runs-on: ubuntu-latest
    needs: version
    if: needs.version.outputs.released == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: agent
            dockerfile: ./code/agent/Dockerfile
          - image: operator
            dockerfile: ./code/operator/Dockerfile
          - image: orchestrator
            dockerfile: ./code/orchestrator/Dockerfile

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image prefix (lowercase for GHCR)
        run: echo "IMAGE_PREFIX=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and push ${{ matrix.image }} image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:${{ needs.version.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:latest
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  publish-release:
    name: Push commit and create release
    runs-on: ubuntu-latest
    needs: [version, build]
    if: needs.version.outputs.released == 'true'
    concurrency:
      group: ${{ github.workflow }}-publish-${{ github.ref_name }}
      cancel-in-progress: false
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            environments/*.txt

      - name: Recreate version commit and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pip install python-semantic-release
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          GITHUB_OUTPUT="" semantic-release version --no-tag --no-push
          git push origin ${{ github.ref_name }}

      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes

      - name: Install Task
        uses: arduino/setup-task@v2

      - name: Install generator dependencies
        run: pip install -r environments/shared-requirements.txt

      - name: Generate CRDs from models
        run: task operator:generate

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.14.0"

      - name: Set chart appVersion and package
        env:
          HELM_EXPERIMENTAL_OCI: 1
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          sed -i.bak "s/^appVersion:.*/appVersion: \"$VERSION\"/" chart/agentickube/Chart.yaml
          helm package chart/agentickube --version "$VERSION" --app-version "$VERSION"
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin
          helm push agentickube-"$VERSION".tgz oci://ghcr.io/juliusharing/agentickube/chart

      - name: Create tag and release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: Release ${{ needs.version.outputs.tag }}
          body_path: release_notes.md
