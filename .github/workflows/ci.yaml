name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint and format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: pip install -r environments/dev-requirements.txt

      - name: Ruff format (check)
        run: ruff format --check .

      - name: Ruff lint
        run: ruff check .

  manifests:
    name: Generate and validate manifests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Task
        uses: arduino/setup-task@v2

      - name: Install generator dependencies
        run: pip install -r environments/shared-requirements.txt

      - name: Generate CRDs from models
        run: task operator:generate

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.14.0"

      - name: Lint Helm chart
        run: helm lint chart/agentickube

      - name: Template Helm chart
        run: helm template agentickube chart/agentickube --namespace agentickube-ns --debug > /dev/null

      - name: Template Helm chart with dev values
        run: helm template agentickube chart/agentickube -f chart/agentickube/values-dev.yaml --namespace agentickube-ns --output-dir /tmp/chart-dev

      - name: Set up Kubeconform
        uses: bmuschko/setup-kubeconform@v1

      - name: Validate chart template output
        run: kubeconform -schema-location default -ignore-missing-schemas -summary -output text /tmp/chart-dev/agentickube/templates/
