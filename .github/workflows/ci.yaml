name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  semantic-pr:
    name: Semantic branch and commits
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check branch name
        run: |
          branch="${{ github.head_ref }}"
          # Allowed: type/description (e.g. feature/add-button, fix/typo)
          if ! echo "$branch" | grep -qE '^(feature|fix|chore|docs|style|refactor|perf|test|build|ci|release)/[a-zA-Z0-9._/-]+$'; then
            echo "::error::Branch name must follow pattern: type/description (e.g. feature/add-button, fix/typo)"
            echo "Allowed types: feature, fix, chore, docs, style, refactor, perf, test, build, ci, release"
            exit 1
          fi
          echo "Branch name OK: $branch"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: environments/dev-requirements.txt

      - name: Install dev dependencies
        run: pip install -r environments/dev-requirements.txt

      - name: Validate commit messages (cz check)
        run: cz check --rev-range ${{ github.event.pull_request.base.sha }}..HEAD

  lint:
    name: Lint and format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            environments/dev-requirements.txt

      - name: Install dev dependencies
        run: pip install -r environments/dev-requirements.txt

      - name: Ruff format (check)
        run: ruff format --check .

      - name: Ruff lint
        run: ruff check .

  type:
    name: Type check (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [operator, agent]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            environments/*.txt

      - name: Install project + dev dependencies
        run: pip install -r environments/all-requirements.txt

      - name: ty check ${{ matrix.package }}
        run: ty check code/${{ matrix.package }} code/shared

  manifests:
    name: Generate and validate manifests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            environments/shared-requirements.txt

      - name: Install Task
        uses: arduino/setup-task@v2

      - name: Install generator dependencies
        run: pip install -r environments/shared-requirements.txt

      - name: Generate CRDs from models
        run: task operator:generate

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.14.0"

      - name: Lint Helm chart
        run: helm lint chart/agentickube

      - name: Template Helm chart
        run: helm template agentickube chart/agentickube --namespace agentickube-ns --debug > /dev/null

      - name: Template Helm chart with dev values
        run: helm template agentickube chart/agentickube -f chart/agentickube/values-dev.yaml --namespace agentickube-ns --output-dir /tmp/chart-dev

      - name: Set up Kubeconform
        uses: bmuschko/setup-kubeconform@v1

      - name: Validate chart template output
        run: kubeconform -schema-location default -ignore-missing-schemas -summary -output text /tmp/chart-dev/agentickube/templates/
