name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint and format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: pip install -r environments/dev-requirements.txt

      - name: Ruff format (check)
        run: ruff format --check .

      - name: Ruff lint
        run: ruff check .

  manifests:
    name: Generate and validate manifests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Task
        uses: arduino/setup-task@v2

      - name: Install generator dependencies
        run: pip install -r environments/shared-requirements.txt

      - name: Generate CRD and Agent examples from models
        run: task operator:generate

      - name: Set up Kubeconform
        uses: bmuschko/setup-kubeconform@v1

      - name: Validate deploy and manifests
        run: |
          kubeconform -schema-location default -ignore-missing-schemas -summary -output text deploy/ manifests/
