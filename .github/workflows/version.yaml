name: Version and tag

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-release-${{ github.ref_name }}
      cancel-in-progress: false

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Pin release branch to workflow sha
        run: git reset --hard ${{ github.sha }}

      - name: Semantic version release
        id: release
        uses: python-semantic-release/python-semantic-release@v10
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          git_committer_name: "github-actions[bot]"
          git_committer_email: "github-actions[bot]@users.noreply.github.com"
          build: false
          vcs_release: true

      - name: Set up Docker Buildx
        if: steps.release.outputs.released == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: steps.release.outputs.released == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push agent image
        if: steps.release.outputs.released == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./src/agent/Dockerfile
          push: true
          tags: |
            derjulezzz/agentickube-agent:${{ steps.release.outputs.version }}
            derjulezzz/agentickube-agent:latest

      - name: Build and push operator image
        if: steps.release.outputs.released == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./src/operator/Dockerfile
          push: true
          tags: |
            derjulezzz/agentickube-operator:${{ steps.release.outputs.version }}
            derjulezzz/agentickube-operator:latest

      - name: Upload deploy assets to release
        if: steps.release.outputs.released == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: Release ${{ steps.release.outputs.tag }}
          body: ${{ steps.release.outputs.release_notes }}
          files: |
            deploy/crd.yaml
            deploy/example-agent.yaml
            deploy/README.md
          allow_updates: true
