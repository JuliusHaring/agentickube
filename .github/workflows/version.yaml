name: Version and release

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  version-and-artifacts:
    name: Version and build artifacts
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-version-artifacts-${{ github.ref_name }}
      cancel-in-progress: false
    permissions:
      contents: write
      packages: write
    outputs:
      released: ${{ steps.version.outputs.released }}
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Pin to workflow commit
        run: git reset --hard ${{ github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bump version (no tag, no push)
        id: version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pip install python-semantic-release
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if semantic-release version --no-tag --no-push; then
            echo "released=true" >> $GITHUB_OUTPUT
            v=$(sed -n 's/^version=//p' VERSION)
            echo "version=$v" >> $GITHUB_OUTPUT
            echo "tag=v$v" >> $GITHUB_OUTPUT
            awk '/^## v'"$v"'/{p=1; print; next} p{if(/^## /) exit; print}' CHANGELOG.md > release_notes.md
          fi

      - name: Set GHCR image prefix (lowercase)
        if: steps.version.outputs.released == 'true'
        run: echo "IMAGE_PREFIX=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        if: steps.version.outputs.released == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: steps.version.outputs.released == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push agent image
        if: steps.version.outputs.released == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./src/agent/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/agent:${{ steps.version.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/agent:latest

      - name: Build and push operator image
        if: steps.version.outputs.released == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./src/operator/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/operator:${{ steps.version.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/operator:latest

      - name: Push version commit to branch
        if: steps.version.outputs.released == 'true'
        run: git push origin ${{ github.ref_name }}

      - name: Upload release notes
        if: steps.version.outputs.released == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release_notes.md

  publish-release:
    name: Create tag and GitHub release
    runs-on: ubuntu-latest
    needs: version-and-artifacts
    if: needs.version-and-artifacts.outputs.released == 'true'
    concurrency:
      group: ${{ github.workflow }}-publish-${{ github.ref_name }}
      cancel-in-progress: false
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes

      - name: Zip deploy artifacts
        run: |
          cd deploy && zip -r ../agentickube-deploy.zip crd.yaml example-rbac.yaml operator.yaml example-agent.yaml && cd ..

      - name: Create tag and release with assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version-and-artifacts.outputs.tag }}
          name: Release ${{ needs.version-and-artifacts.outputs.tag }}
          body_path: release_notes.md
          files: agentickube-deploy.zip
          allow_updates: true
