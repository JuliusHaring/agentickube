# Default values for agentickube.
# Install: helm install agentickube oci://ghcr.io/juliusharing/agentickube/chart

# Namespace for the operator and RBAC (created if --create-namespace)
namespace: agentickube-ns

# Operator Deployment
operator:
  image:
    repository: ghcr.io/juliusharing/agentickube/operator
    tag: ""
    pullPolicy: IfNotPresent
  replicas: 1

# RBAC: ServiceAccount, ClusterRole, ClusterRoleBinding for the operator
rbac:
  create: true

# Optional: Ollama LLM server (for local/dev use)
ollama:
  enabled: false
  image: ollama/ollama:latest
  model: qwen3:1.7b
  pvc:
    size: 7Gi

# Optional: OpenTelemetry collector (for traces/metrics)
otel:
  enabled: false
  image: otel/opentelemetry-collector-contrib:latest

# Optional: Jaeger all-in-one (OTEL exporter; enable with otel for tracing UI)
jaeger:
  enabled: false
  image: jaegertracing/all-in-one:latest

# Optional: Keycloak (IdP for OAuth2; enable for dev/test auth flows)
# When enabled with realm/client pre-filled (values-dev), agents can use auth.type=oauth2 with these URLs.
keycloak:
  enabled: false
  image: quay.io/keycloak/keycloak:latest
  adminUsername: admin
  adminPassword: admin
  # Pre-imported realm (used when keycloak.realmImport is true or in values-dev)
  realm: agentickube
  clientId: agent
  clientSecret: agent-dev-secret
  # Set realmImport: true to mount a ConfigMap and start Keycloak with --import-realm
  realmImport: false

# Agent defaults and CRs (image used when agent spec omits image; workspace defaults; list of Agent CRs)
agentickube:
  image:
    repository: ghcr.io/juliusharing/agentickube/agent
    tag: ""
    pullPolicy: IfNotPresent
  # Workspace: default path and optional default PVC (agents can reference spec.workspace.persistentVolumeClaim.claimName)
  workspace:
    path: /workspace
    pvc:
      create: false
      name: agent-workspace-pvc
      size: 1Gi
  # Multiple Agent CRs: list of { name, spec }. spec is the full Agent spec (ai.juliusharing.com/v1).
  # Example: agents: [ { name: my-agent, spec: { llm: { modelName: qwen3:1.7b, baseUrl: http://ollama:11434/v1 }, ... } } ]
  #
  # Agent HTTP auth (optional). Use spec.auth to require authentication on the agent API.
  # Credentials: value (literal) or valueFrom (same as core.v1.EnvVarSource: secretKeyRef or configMapKeyRef).
  #   auth:
  #     type: basic          # or api_key | oauth2
  #     basic:
  #       username: { valueFrom: { secretKeyRef: { name: my-secret, key: username } } }
  #       password: { valueFrom: { secretKeyRef: { name: my-secret, key: password } } }
  #   auth:
  #     type: api_key
  #     apiKey:
  #       apiKey: { valueFrom: { secretKeyRef: { name: my-secret, key: api-key } } }
  #   auth:
  #     type: oauth2
  #     oauth2:
  #       issuerUrl: https://keycloak.example.com/realms/my-realm   # required for JWT validation
  #       audience: my-client   # optional; verify aud claim if set
  #       tokenUrl: ...   # for clients to obtain tokens
  #       clientId: ...   # for clients
  #       clientSecret: { value: "..." } or { valueFrom: { secretKeyRef: { name: my-secret, key: client-secret } } }
  #
  # Optional spec.env (core.v1.EnvVar[]) and spec.envFrom (core.v1.EnvFromSource[]) for extra env vars
  # or whole Secrets/ConfigMaps, same as Pod.spec.containers[].env / envFrom.
  agents: []
  networkPolicy:
    enabled: false
    # When enabled, deny all egress except:
    # - DNS to kube-dns (TCP/UDP 53)
    # - Optional cluster egress and extra CIDRs/namespaces below.
    allowClusterEgress: false
    # Cluster CIDR for in-cluster services/pods (used when allowClusterEgress is true).
    clusterCidr: 10.0.0.0/8
    # Extra CIDRs to allow egress to (e.g. NAT gateway, specific external ranges).
    extraEgressCidrs: []
    # Extra namespaces to allow egress to by name (via namespaceSelector).
    extraEgressNamespaces: []
