{{- /* Agent CRs as regular resources (no hooks). Hooks get deleted/recreated on upgrade and caused races. CRDs are pre-install so they exist before this manifest is applied. */}}
{{- if .Values.agentickube.agents }}
{{- range .Values.agentickube.agents }}
apiVersion: ai.juliusharing.com/v1
kind: Agent
metadata:
  name: {{ .name | quote }}
  namespace: {{ $.Release.Namespace }}
  labels:
    agentickube.release: {{ $.Release.Name | quote }}
    app.kubernetes.io/managed-by: {{ $.Release.Service | quote }}
  annotations:
    meta.helm.sh/release-name: {{ $.Release.Name | quote }}
    meta.helm.sh/release-namespace: {{ $.Release.Namespace | quote }}
spec:
  {{- if .spec }}
  {{- toYaml .spec | nindent 2 }}
  {{- else }}
  image: {{ $.Values.agentickube.image.repository }}:{{ $.Values.agentickube.image.tag | default $.Chart.AppVersion | default "latest" }}
  imagePullPolicy: {{ $.Values.agentickube.image.pullPolicy }}
  {{- end }}
---
{{- end }}
{{- end }}
