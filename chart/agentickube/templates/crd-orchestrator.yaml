                              nullable: true
                          type: object
                          nullable: true
                        configMapKeyRef:
                          properties:
                            name:
                              type: string
                              nullable: true
                            key:
                              type: string
                              nullable: true
                          type: object
                          nullable: true
                      type: object
                      nullable: true
                  required:
                  - name
                  type: object
                type: array
                nullable: true
              openTelemetry:
                properties:
                  enabled:
                    default: false
                    type: boolean
                  endpoint:
                    type: string
                    nullable: true
                  serviceName:
                    type: string
                    nullable: true
                  samplingRatio:
                    type: number
                    nullable: true
                type: object
                nullable: true
