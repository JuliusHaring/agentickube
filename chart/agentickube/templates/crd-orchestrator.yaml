                      secretName:
                        type: string
                        nullable: true
                      secretKey:
                        type: string
                        nullable: true
                      raw:
                        type: string
                        nullable: true
                    type: object
                    nullable: true
                type: object
                nullable: true
              agents:
                items:
                  properties:
                    name:
                      type: string
                    url:
                      type: string
                      nullable: true
                    description:
                      type: string
                      nullable: true
                  required:
