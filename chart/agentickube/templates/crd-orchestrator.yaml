                      type: string
                    type: object
                    nullable: true
                type: object
                nullable: true
              securityContext:
                properties:
                  runAsUser:
                    type: integer
                    nullable: true
                  runAsGroup:
                    type: integer
                    nullable: true
                  runAsNonRoot:
                    type: boolean
                    nullable: true
                  allowPrivilegeEscalation:
                    type: boolean
                    nullable: true
                  readOnlyRootFilesystem:
                    type: boolean
                    nullable: true
                  capabilities:
