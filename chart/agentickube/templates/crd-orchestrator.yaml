                          type: string
                        type: array
                        nullable: true
                    type: object
                    nullable: true
                type: object
                nullable: true
              podSecurityContext:
                properties:
                  runAsUser:
                    type: integer
                    nullable: true
                  runAsGroup:
                    type: integer
                    nullable: true
                  runAsNonRoot:
                    type: boolean
                    nullable: true
                  fsGroup:
                    type: integer
                    nullable: true
                  seccompProfile:
