apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: orchestrators.ai.juliusharing.com
  labels:
    app.kubernetes.io/name: orchestrators
    app.kubernetes.io/part-of: agentickube
  annotations:
    helm.sh/hook: pre-install
    helm.sh/hook-weight: '-1'
spec:
  group: ai.juliusharing.com
  scope: Namespaced
  names:
