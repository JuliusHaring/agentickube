# Operator Deployment: watches Agent and Orchestrator CRs and reconciles them to Deployments/Jobs/CronJobs.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentickube-operator
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: agentickube-operator
    app.kubernetes.io/part-of: agentickube
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: {{ .Values.operator.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: agentickube-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agentickube-operator
        app.kubernetes.io/part-of: agentickube
    spec:
      serviceAccountName: agentickube-operator
      containers:
        - name: operator
          image: "{{ .Values.operator.image.repository }}:{{ .Values.operator.image.tag | default .Chart.AppVersion | default `latest` }}"
          imagePullPolicy: {{ .Values.operator.image.pullPolicy }}
