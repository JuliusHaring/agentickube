# Example: agent sequence for stock analytics (Ollama + OTEL + Jaeger).
# Usage: helm upgrade --install agentickube ./chart/agentickube -f chart/agentickube/values-dev.yaml -n agentickube-ns --create-namespace
# When you remove an agent/orchestrator from the lists below, upgrade will delete that CR (and the operator will remove its pods).
#
# Temporary: Gemini 3 for dev. Do not commit real API keys long-term; use a Secret + apiKey.secretName/secretKey in production.
_llm: &llm
  modelName: qwen3:1.7b
  baseUrl: http://ollama:11434/v1

operator:
  image:
    repository: agentickube-operator
    tag: latest
    pullPolicy: IfNotPresent

ollama:
  enabled: true
  model: qwen3:1.7b
  pvc:
    size: 2Gi

otel:
  enabled: true

jaeger:
  enabled: true

agentImage:
  repository: agentickube-agent
  tag: latest
  pullPolicy: IfNotPresent

orchestratorImage:
  repository: agentickube-orchestrator
  tag: latest
  pullPolicy: IfNotPresent

workspacePvc:
  create: true
  name: agent-workspace-pvc
  size: 1Gi

agents:
  - name: stock-fetcher
    spec:
      image: agentickube-agent:latest
      imagePullPolicy: IfNotPresent
      llm: *llm
      skills:
        builtinSkills: [create-skill, fetch-stocks]
      prompts:
        systemPrompt: |
          You are the first step in a stock-analytics pipeline. Your ONLY job is to fetch stock data and return it. The next agents do risk analysis and buy/sell reasoning—you do not. You only fetch and output data.

          RULE: If the user mentions a ticker (e.g. TSLA) or "fetch" or "current price", call the fetch-stocks skill immediately. Your reply must be the fetched data only. FORBIDDEN: Do NOT say "Would you like me to fetch", "I can fetch", or ask any question—just call the tool and return the result. Any response that does not contain actual price/data fails the pipeline.

          Use the skill "fetch-stocks" to fetch the stock data. If it doesn't exist, create it using the "create-skill" skill. Return structured data (e.g. symbol, change, percent) and cite the source. Keep the response self-contained so the next agents can analyze it without fetching again.
          When the user asks about a specific ticker (e.g. TSLA, AAPL) or "current price" or "today": (1) Fetch the latest quote now—do not use cached or session-old data. (2) Always include the exact current price in USD and the date/time of the quote (e.g. "Current price: $XXX.XX USD as of [date and time] from [source]"). (3) If the only data available is delayed or previous close, say so clearly (e.g. "Last close: $X.XX" or "Delayed quote as of [time]").
      workspace:
        path: /workspace
        persistentVolumeClaim:
          claimName: agent-workspace-pvc
      conversation:
        enabled: true
        maxHistory: 10
      openTelemetry:
        enabled: true
        endpoint: http://otel-collector:4318
        serviceName: stock-fetcher
        samplingRatio: 1.0

  - name: analyst-risk
    spec:
      image: agentickube-agent:latest
      imagePullPolicy: IfNotPresent
      llm: *llm
      skills:
        builtinSkills: []
      prompts:
        systemPrompt: |
          You are the risk analyst in a stock-analytics pipeline. You run after the stock-fetcher. Your input already contains the mover list and data—do not fetch anything.

          Your ONLY job: write a short risk assessment based on that data. Your output must include:
          - Volatility: how extreme the moves are and what that implies for ongoing risk.
          - Drawdown risk: potential for sharp reversals, especially in names that moved 50%+.
          - Concentration: sector or single-name concentration if the movers cluster in one theme.
          - Tail risk: likelihood and impact of further large moves (e.g. illiquid names, binary events).

          FORBIDDEN: Do NOT list tickers, prices, or percentage changes. Do NOT say "here are the top gainers/losers" or repeat the mover list in any form. The user and the next agent already have that data; they need your risk view only. If you output a list of movers, you have failed the task.
      workspace:
        path: /workspace
        persistentVolumeClaim:
          claimName: agent-workspace-pvc
      conversation:
        enabled: true
        maxHistory: 10
      openTelemetry:
        enabled: true
        endpoint: http://otel-collector:4318
        serviceName: analyst-risk
        samplingRatio: 1.0

  - name: analyst-momentum
    spec:
      image: agentickube-agent:latest
      imagePullPolicy: IfNotPresent
      llm: *llm
      skills:
        builtinSkills: []
      prompts:
        systemPrompt: |
          You are the momentum/technical analyst in a stock-analytics pipeline. Your input will be the user question plus "Previous agent" response(s) with stock data and risk view. Do not fetch data yourself.

          Your job: output a short momentum/technical analysis (trends, relative strength, what might be driving the moves). Do NOT repeat the mover list or re-answer "top 3 movers". Output only your analysis so the pipeline gets your added value.
          When the user asked for "current price" or "price in USD", include one line at the top: "**Current price (from data):** $X.XX USD" using the price from the previous step's data.
          When the user asked for a buy/sell or recommendation, end your response with a single line: "**Conclusion:** Buy / Sell / Hold — [one sentence reasoning]." You may add "This is not financial advice." after it. Give a clear conclusion based on the data and your analysis.
      workspace:
        path: /workspace
        persistentVolumeClaim:
          claimName: agent-workspace-pvc
      conversation:
        enabled: true
        maxHistory: 10
      openTelemetry:
        enabled: true
        endpoint: http://otel-collector:4318
        serviceName: analyst-momentum
        samplingRatio: 1.0

orchestrators:
  - name: stock-analytics-sequence
    spec:
      image: agentickube-orchestrator:latest
      imagePullPolicy: IfNotPresent
      llm: *llm
      agents:
        - name: stock-fetcher
          description: Step 1. Fetches stock data (Yahoo, top movers). Only agent that fetches; creates fetch-stocks skill if needed.
        - name: analyst-risk
          description: Step 2. Risk assessment on fetcher output only (volatility, drawdown, tail risk). Does not fetch.
        - name: analyst-momentum
          description: Step 3. Momentum/technical analysis on data from prior steps. Does not fetch.
      strategy:
        type: sequence
        maxRounds: 10
      openTelemetry:
        enabled: true
        endpoint: http://otel-collector:4318
        serviceName: stock-analytics-sequence
        samplingRatio: 1.0
