version: '3'

includes:
  docker: tasks/docker.yaml
  k8s: tasks/k8s.yaml
  dev: tasks/dev.yaml
  agent: src/agent/tasks/agent.yaml
  operator: src/operator/tasks/operator.yaml

tasks:
  default:
   - task: deploy-all

  deploy-local:
    - task: dev:all
    - task: docker:build-all
    - task: k8s:create-ns
    - task: k8s:set-context
    - task: k8s:init-ns
    - task: k8s:apply-crd
    - task: k8s:apply-rbac
    - task: k8s:apply-manifests

  deploy-all:
    - task: deploy-local
    - task: k8s:apply-operator
