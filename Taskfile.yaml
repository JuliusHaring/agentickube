version: '3'

includes:
  docker: tasks/docker.yaml
  k8s: tasks/k8s.yaml
  dev: tasks/dev.yaml
  agent: src/agent/tasks/agent.yaml

tasks:
  default:
   - task: deploy

  version:current:
    desc: Print current version from VERSION file
    cmds:
      - 'v=$$(cat VERSION | tr -d "\n"); echo $${v#version=}'

  deploy:
    - task: dev:all
    - task: docker:build-all
    - task: k8s:create-ns
    - task: k8s:set-context
    - task: k8s:apply-crd
    - task: k8s:init-ns
    - task: k8s:apply-all
