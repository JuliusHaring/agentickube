# Minimal example Agent CR. spec.llm is mapped by the operator to LLM_* env vars
# (LLM_MODEL_NAME, LLM_BASE_URL, LLM_API_KEY) in the agent container.
# Optional: spec.image and spec.imagePullPolicy override the operator default.
apiVersion: ai.juliusharing.com/v1
kind: Agent
metadata:
  name: example
spec:
  # image: ghcr.io/OWNER/agentickube/agent:latest
  # imagePullPolicy: IfNotPresent
  llm:
    # provider: openai
    modelName: ""          # e.g. gpt-4o or your model id
    baseUrl: ""            # e.g. https://api.openai.com/v1 or http://ollama:11434/v1
    # apiKey:
    #   raw: "sk-..."      # inline (avoid in prod)
    #   # OR from a Secret:
    #   secretName: my-llm-secret
    #   secretKey: api-key
  # prompts:
  #   systemPrompt: "You are a helpful assistant."
  # skills:
  #   builtinSkills: []              # omit to include all; [] disables all; or list names
  #   items:
  #     - name: my-skill             # inline skill content
  #       content: |
  #         ---
  #         name: my-skill
  #         description: Example inline skill.
  #         ---
  #         # My Skill
  #         Custom instructions here.
  #     - name: external-skill       # skill from a ConfigMap
  #       configMapRef:
  #         name: my-skill-cm
  #         key: SKILL.md            # optional, defaults to SKILL.md
  #   bootstrap:
  #     configMapRef:
  #       name: my-skills-cm   # ConfigMap keys = paths e.g. "my-skill/SKILL.md", "my-skill/code/tool.py"
  #                            # Seeded into {workspace}/skills/ at startup alongside built-in skills.
  # mcpServers:
  #   - url: https://your-mcp.example.com
  #     type: streamable_http
  # workspace:
  #   path: /workspace
  #   persistentVolumeClaim:
  #     claimName: agent-workspace-pvc
