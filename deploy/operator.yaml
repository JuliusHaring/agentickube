# Operator Deployment: watches Agent and Orchestrator CRs and reconciles them to Deployments/Jobs/CronJobs.
# Requires: CRDs applied, and RBAC (ServiceAccount agent-operator) in the same namespace (e.g. deploy/example-rbac.yaml).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentickube-operator
  namespace: agentickube-ns
  labels:
    app.kubernetes.io/name: agentickube-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agentickube-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agentickube-operator
    spec:
      serviceAccountName: agent-operator
      containers:
        - name: operator
          # Use local image when running deploy-all (docker:build-all); for released installs use ghcr.io/juliusharing/agentickube/operator:latest
          image: agentickube-operator:latest
          imagePullPolicy: IfNotPresent
