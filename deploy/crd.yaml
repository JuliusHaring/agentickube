apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: agents.ai.juliusharing.com   # matches plural + group
spec:
  group: ai.juliusharing.com
  scope: Namespaced
  names:
    plural: agents
    singular: agent
    kind: Agent
    shortNames:
      - ag
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object                 # <-- root type
          properties:
            spec:
              type: object             # <-- spec must have a type
              properties:
                image:
                  type: string
                  description: Agent container image. Defaults to operator default (AGENT_IMAGE env or ghcr.io/OWNER/agentickube/agent:latest).
                imagePullPolicy:
                  type: string
                  enum: [Always, IfNotPresent, Never]
                  description: Image pull policy for the agent container. Defaults to operator default (AGENT_IMAGE_PULL_POLICY env or IfNotPresent).
                llm:
                  type: object
                  properties:
                    provider:
                      type: string
                      enum: [openai, google, huggingface, ollama]
                      description: LLM provider (default openai).
                    modelName:
                      type: string
                    baseUrl:
                      type: string
                    apiKey:
                      type: object
                      properties:
                        secretName:
                          type: string
                        secretKey:
                          type: string
                        raw:
                          type: string
                prompts:
                  type: object
                  properties:
                    systemPrompt:
                      type: string
                functions:
                  type: array
                  description: Functions to attach to the agent.
                  items:
                    type: object
                    required: [name]
                    properties:
                      name:
                        type: string
                skills:
                  type: object
                  description: Agent skills (SKILL.md files injected into the system prompt).
                  properties:
                    builtinSkills:
                      description: >-
                        Built-in skills to activate. Omit to include all, set to
                        empty array [] to disable all, or list skill names to include.
                      type: array
                      items:
                        type: string
                    items:
                      type: array
                      description: Individual skills (inline content or ConfigMap references).
                      items:
                        type: object
                        required: [name]
                        properties:
                          name:
                            type: string
                            description: Skill name (used as filename, lowercase-hyphens).
                          content:
                            type: string
                            description: Inline SKILL.md content (mutually exclusive with configMapRef).
                          configMapRef:
                            type: object
                            description: Reference to a ConfigMap containing the skill.
                            required: [name]
                            properties:
                              name:
                                type: string
                                description: ConfigMap name.
                              key:
                                type: string
                                default: SKILL.md
                                description: Key within the ConfigMap (default SKILL.md).
                    bootstrap:
                      type: object
                      description: >
                        Optional ConfigMap seeded into {workspace}/skills/ on agent startup.
                        Keys in the ConfigMap are relative file paths such as
                        "my-skill/SKILL.md" or "my-skill/code/tool.py".
                      properties:
                        configMapRef:
                          type: object
                          description: ConfigMap containing a skills tree (keys = relative file paths).
                          required: [name]
                          properties:
                            name:
                              type: string
                              description: ConfigMap name.
                mcpServers:
                  type: array
                  description: MCP servers to attach to the agent (toolsets).
                  items:
                    type: object
                    required: [url]
                    properties:
                      url:
                        type: string
                        description: Server URL (SSE or Streamable HTTP endpoint).
                      type:
                        type: string
                        enum: [sse, streamable_http]
                        default: streamable_http
                        description: Transport type (default streamable_http).
                workspace:
                  type: object
                  description: Writable folder for the agent; optional PVC mount.
                  properties:
                    path:
                      type: string
                      default: /workspace
                      description: Mount path in the container (must be absolute).
                    persistentVolumeClaim:
                      type: object
                      description: If set, mount this PVC at path; otherwise use ephemeral emptyDir.
                      properties:
                        claimName:
                          type: string
                          description: Name of the PersistentVolumeClaim in the same namespace.
                # --- Pod/container runtime configuration ---
                resources:
                  type: object
                  description: CPU/memory requests and limits for the agent container.
                  properties:
                    requests:
                      type: object
                      properties:
                        cpu:
                          type: string
                          description: e.g. "100m", "1"
                        memory:
                          type: string
                          description: e.g. "128Mi", "1Gi"
                    limits:
                      type: object
                      properties:
                        cpu:
                          type: string
                        memory:
                          type: string
                securityContext:
                  type: object
                  description: Container security context (runAsUser, runAsGroup, etc.).
                  properties:
                    runAsUser:
                      type: integer
                      description: UID to run the container process.
                    runAsGroup:
                      type: integer
                      description: GID for the container process.
                    runAsNonRoot:
                      type: boolean
                    allowPrivilegeEscalation:
                      type: boolean
                    readOnlyRootFilesystem:
                      type: boolean
                    capabilities:
                      type: object
                      properties:
                        add:
                          type: array
                          items:
                            type: string
                        drop:
                          type: array
                          items:
                            type: string
                podSecurityContext:
                  type: object
                  description: Pod-level security context (fsGroup, runAsUser/Group, etc.).
                  properties:
                    runAsUser:
                      type: integer
                    runAsGroup:
                      type: integer
                    runAsNonRoot:
                      type: boolean
                    fsGroup:
                      type: integer
                    seccompProfile:
                      type: object
                      properties:
                        type:
                          type: string
                          enum: [Unconfined, RuntimeDefault, Localhost]
                        localhostProfile:
                          type: string
                nodeSelector:
                  type: object
                  additionalProperties:
                    type: string
                  description: Node labels for pod scheduling.
                tolerations:
                  type: array
                  items:
                    type: object
                    properties:
                      key:
                        type: string
                      operator:
                        type: string
                        enum: [Exists, Equal]
                      value:
                        type: string
                      effect:
                        type: string
                        enum: [NoSchedule, PreferNoSchedule, NoExecute]
                      tolerationSeconds:
                        type: integer
                serviceAccountName:
                  type: string
                  description: Service account for the agent pod.
                env:
                  type: array
                  description: Extra environment variables for the agent container.
                  items:
                    type: object
                    required: [name]
                    properties:
                      name:
                        type: string
                      value:
                        type: string
                      valueFrom:
                        type: object
                        properties:
                          secretKeyRef:
                            type: object
                            properties:
                              name:
                                type: string
                              key:
                                type: string
                          configMapKeyRef:
                            type: object
                            properties:
                              name:
                                type: string
                              key:
                                type: string
                openTelemetry:
                  type: object
                  description: Optional OpenTelemetry (OTLP) export for traces/metrics.
                  properties:
                    enabled:
                      type: boolean
                      default: false
                      description: If true, agent exports traces to the configured endpoint.
                    endpoint:
                      type: string
                      description: OTLP endpoint (e.g. http://otel-collector:4318 for HTTP, or :4317 for gRPC).
                    serviceName:
                      type: string
                      description: Service name for the telemetry (defaults to agent name).
                    samplingRatio:
                      type: number
                      minimum: 0
                      maximum: 1
                      description: Trace sampling ratio 0-1 (1 = sample all). Optional; default 1.
