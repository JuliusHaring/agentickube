# metadata:
#   name: agent-cr-editors
# roleRef:
#   apiGroup: rbac.authorization.k8s.io
#   kind: ClusterRole
#   name: agent-cr-editor
# subjects:
#   - apiGroup: rbac.authorization.k8s.io
#     kind: Group
#     name: system:authenticated

---
# --- Who can query agents: discover Agent CRs and reach agent pods (e.g. port-forward)
# No create/update/delete on Agent CRs; no create/delete on Deployments or Pods.
# Bind agent-querier Role to users/groups who may only call the agent HTTP API (POST /query).
# Note: the agent app itself has no HTTP auth; for "who can call /query" use API keys or
# an Ingress/gateway with auth in addition to this RBAC.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agent-querier
  namespace: agentickube-ns
rules:
  # Discover which agents exist (names, spec summary)
  - apiGroups: ["ai.juliusharing.com"]
    resources: ["agents"]
    verbs: ["get", "list", "watch"]
  # See agent pods (to port-forward or hit from in-cluster)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  # Port-forward to agent pod: kubectl port-forward pod/agent-my-agent-xxx 8080:80
  - apiGroups: [""]
    resources: ["pods/portforward"]
    verbs: ["create"]
  # If you expose agents via Service, allow reading so queriers can use them
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch"]
---
# Example: allow a group "agent-queriers" to query agents in the agentickube-ns namespace.
# Replace with your user/group and namespace.
