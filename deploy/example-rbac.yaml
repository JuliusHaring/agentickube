#   namespace: agentickube-ns
# rules:
#   - apiGroups: ["ai.juliusharing.com"]
#     resources: ["agents"]
#     verbs: ["get", "list", "watch"]
#   - apiGroups: ["apps"]
#     resources: ["deployments"]
#     verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
#   - apiGroups: [""]
#     resources: ["pods"]
#     verbs: ["get", "list", "watch"]
#   - apiGroups: [""]
#     resources: ["events"]
#     verbs: ["create", "patch"]
# ---
# apiVersion: rbac.authorization.k8s.io/v1
# kind: RoleBinding
# metadata:
#   name: agent-operator
#   namespace: agentickube-ns
# roleRef:
