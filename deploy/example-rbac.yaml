# --- Operator identity (use this ServiceAccount in the operator Deployment)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agentickube-operator
  namespace: agentickube-ns
---
# --- Cluster-wide permissions for the operator (required when using --all-namespaces)
# The default image runs with --all-namespaces, so it needs cluster-scoped list/watch on agents and orchestrators.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: agentickube-operator
rules:
  # CRD discovery (Kopf / client need this to find custom resources)
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]
  # Watch and reconcile Agent CRs in all namespaces; patch for status updates
  - apiGroups: ["ai.juliusharing.com"]
    resources: ["agents"]
    verbs: ["get", "list", "watch", "patch", "update"]
  # Watch and reconcile Orchestrator CRs in all namespaces
  - apiGroups: ["ai.juliusharing.com"]
    resources: ["orchestrators"]
    verbs: ["get", "list", "watch", "patch", "update"]
  # Create/update/patch/delete Deployments owned by Agent/Orchestrator CRs
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Create/update/patch/delete Jobs owned by Agent/Orchestrator CRs
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Create/update/patch/delete CronJobs owned by Agent/Orchestrator CRs
  - apiGroups: ["batch"]
    resources: ["cronjobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Create/update/patch/delete Services for Agent/Orchestrator Deployments
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Create/update/patch/delete ConfigMaps for inline skills
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Kopf and GC need to see Pods (owner references, status)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  # Emit events on Agent/Orchestrator CRs (optional; helps with kubectl describe)
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: agentickube-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: agentickube-operator
subjects:
  - kind: ServiceAccount
    name: agentickube-operator
    namespace: agentickube-ns
---
