#     name: agent-operator
#     namespace: agentickube-ns
---
# --- Optional: who can manage Agent CRs (create/update/delete agents)
# Bind this ClusterRole to users/groups to restrict who can kubectl apply/delete Agent CRs.
# Example: bind to a group "agent-editors" or a specific user.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: agent-cr-editor
rules:
  - apiGroups: ["ai.juliusharing.com"]
    resources: ["agents"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
# Example: allow all authenticated users in the cluster to edit Agent CRs (relaxed).
# Replace with a more restrictive RoleBinding (e.g. to a group or single user) as needed.
# apiVersion: rbac.authorization.k8s.io/v1
