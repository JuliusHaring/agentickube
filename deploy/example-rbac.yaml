# --- Operator identity (use this ServiceAccount in the operator Deployment)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-operator
  namespace: agentickube-ns
---
# --- Cluster-wide permissions for the operator (required when using --all-namespaces)
# The default image runs with --all-namespaces, so it needs cluster-scoped list/watch on agents.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: agent-operator
rules:
  # CRD discovery (Kopf / client need this to find custom resources)
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]
  # Watch and reconcile Agent CRs in all namespaces; patch for status updates
  - apiGroups: ["ai.juliusharing.com"]
    resources: ["agents"]
    verbs: ["get", "list", "watch", "patch", "update"]
  # Create/update/patch/delete Deployments owned by Agent CRs (in any namespace)
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Kopf and GC need to see Pods (owner references, status)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  # Emit events on Agent CRs (optional; helps with kubectl describe agent/...)
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: agent-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: agent-operator
subjects:
  - kind: ServiceAccount
    name: agent-operator
    namespace: agentickube-ns
---
# --- Optional: namespaced-only Role if you run the operator with --namespace=agentickube-ns
# Uncomment and use this instead of the ClusterRole above if you restrict the operator to one namespace.
# apiVersion: rbac.authorization.k8s.io/v1
# kind: Role
# metadata:
