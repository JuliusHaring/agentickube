---
# --- Who can query agents/orchestrators: discover CRs and reach pods (e.g. port-forward)
# No create/update/delete on CRs; no create/delete on Deployments or Pods.
# Bind agent-querier Role to users/groups who may only call the HTTP API (POST /query).
# Note: the apps have no HTTP auth; for "who can call /query" use API keys or
# an Ingress/gateway with auth in addition to this RBAC.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agent-querier
  namespace: agentickube-ns
rules:
  # Discover which agents and orchestrators exist (names, spec summary)
  - apiGroups: ["ai.juliusharing.com"]
    resources: ["agents", "orchestrators"]
    verbs: ["get", "list", "watch"]
  # See pods (to port-forward or hit from in-cluster)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  # Port-forward to agent/orchestrator pod
  - apiGroups: [""]
    resources: ["pods/portforward"]
    verbs: ["create"]
  # Read Services
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch"]
---
# Example: allow a group "agent-queriers" to query agents in the agentickube-ns namespace.
# Replace with your user/group and namespace.
