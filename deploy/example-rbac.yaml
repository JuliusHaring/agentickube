---
# --- Optional: who can manage Agent and Orchestrator CRs (create/update/delete)
# Bind this ClusterRole to users/groups to restrict who can kubectl apply/delete CRs.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: agent-cr-editor
rules:
  - apiGroups: ["ai.juliusharing.com"]
    resources: ["agents", "orchestrators"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
# Example: allow all authenticated users in the cluster to edit Agent/Orchestrator CRs (relaxed).
# Replace with a more restrictive RoleBinding (e.g. to a group or single user) as needed.
