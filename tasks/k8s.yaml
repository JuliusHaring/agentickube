version: '3'

tasks:
  run-orchestrator: watchmedo auto-restart --patterns "*.py" -d src/operator  -- env PYTHONPATH=src kopf run src/operator/main.py --namespace=test --verbose

  create-ns: kubectl create namespace test || true

  set-context: kubectl config set-context --current --namespace=test || true

  init-ns: 
    - kubectl delete ag --all -n test
    - kubectl delete deployment --all -n test
    - kubectl delete pod --all -n test
    # - kubectl delete pvc --all -n test
    # - kubectl delete pv --all -n test
    - kubectl delete rolebinding --all -n test
    - kubectl delete role --all -n test
    - kubectl delete serviceaccount --all -n test
    - kubectl delete secret --all -n test
    - kubectl delete configmap --all -n test
    - kubectl delete service --all -n test
    - kubectl delete ingress --all -n test
    - kubectl delete cronjob --all -n test
    - kubectl delete job --all -n test

  apply-crd: kubectl apply -f deploy/crd.yaml

  apply-folder: kubectl apply -f manifests/

  apply-example: kubectl apply -f deploy/example-agent.yaml

  apply-all:
    - task: apply-crd
    - task: apply-folder
    - task: apply-example